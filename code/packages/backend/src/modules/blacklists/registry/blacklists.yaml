# ============================================================================
# EmailDeliveryHero — Blocklist Registry (single source of truth)
# ============================================================================
# The machine twin of pm/checks/blacklists.mdx §9 (research narrative) per §18.
# Every email blocklist we know: where it lives (zone / url), how to query it
# (query.method + return_codes), how much it matters (tier / weight / severity),
# and how to get off it (lookup_url / delist_url / auto_expires).
#
# Rules (pm/checks/blacklists.mdx §18):
#   * Edited only via PR — reviewed like code. Never written at runtime.
#   * Runtime/operator overrides go to <stateDir>/blacklist_zones.yaml,
#     merged by `zone` (override wins). A zone in dead_zones can NEVER be
#     enabled from anywhere.
#   * Loaded + validated at backend boot by
#     src/modules/audit/checks/blacklist/zones.ts — a malformed entry aborts
#     boot loudly (a silently-empty catalog would report every domain clean).
#   * Keep this file and §9 in lockstep — updating one without the other is a
#     spec violation.
#
# Entry fields:
#   name / url / type / description  — required on every entry.
#   type: ip | domain | both         — both = queried on the IP and domain sweeps.
#   zone                             — DNS zone queried; omit for web_only lists.
#   query.method: dnsbl | rhsbl | web_only
#   return_codes                     — exact 127.x answer → meaning.
#   bitmask                          — SURBL/URIBL-style bit decode of the last octet.
#   refusal_codes                    — in-band "query refused" answers (never a listing).
#   tier: high | medium | low        — drives default weight/severity (§3).
#   access.cost: free | registration | paid
#   paid_delist_offered: true        — triggers the PS-13 never-pay advisory.
#   positive: true                   — being listed is GOOD (DNSWL).
#   advisory: true                   — reputation feed handled by the positive-
#                                      reputation probes, not the listing sweep.
#   status.alive                     — liveness bookkeeping (§9.5).
# ============================================================================

registry_version: 1
compiled: 2026-07
sources:
  - https://multirbl.valli.org
  - https://www.dnsbl.com
  - https://mxtoolbox.com/blacklists.aspx
  - operator sites (verified per entry)

blacklists:
  # ==========================================================================
  # Tier HIGH — IP blocklists (used by major receivers; a hit really hurts)
  # ==========================================================================
  - name: Spamhaus ZEN
    url: https://www.spamhaus.org
    type: ip
    description: >-
      Combined Spamhaus IP zone packing SBL (manual spam operations), CSS
      (snowshoe), XBL (compromised hosts, ex-CBL) and PBL (dynamic-range
      policy) into one query with distinct return codes. The single
      highest-impact IP list — a hit here craters placement at every major
      receiver.
    zone: zen.spamhaus.org
    query: { method: dnsbl, record_types: [A, TXT], rfc5782_probe: true }
    tier: high
    weight: 1.0
    severity: critical
    enabled: true
    lookup_url: https://check.spamhaus.org
    delist_url: https://check.spamhaus.org
    return_codes:
      "127.0.0.2": { label: "SBL (manual spam listing)", severity: critical, problem_state: PS-1 }
      "127.0.0.3": { label: "CSS (snowshoe spam)", severity: critical, problem_state: PS-1 }
      "127.0.0.4": { label: "XBL (compromised host)", severity: critical, problem_state: PS-2 }
      "127.0.0.5": { label: "XBL (compromised host)", severity: critical, problem_state: PS-2 }
      "127.0.0.6": { label: "XBL (compromised host)", severity: critical, problem_state: PS-2 }
      "127.0.0.7": { label: "XBL (compromised host)", severity: critical, problem_state: PS-2 }
      "127.0.0.10": { label: "PBL (ISP policy: dynamic range)", severity: warning, problem_state: PS-3 }
      "127.0.0.11": { label: "PBL (Spamhaus policy: dynamic range)", severity: warning, problem_state: PS-3 }
    refusal_codes: ["127.255.255.252", "127.255.255.254", "127.255.255.255"]
    access:
      cost: free
      notes: "Free low-volume via your own recursive resolver; commercial/high volume needs the free-tier DQS key."
      dqs_zone: "{key}.zen.dq.spamhaus.net"
    status: { alive: true }

  - name: Barracuda BRBL
    url: https://www.barracudacentral.org
    type: ip
    description: >-
      Barracuda Reputation Block List — feeds Barracuda's widely deployed
      appliances/gateways. Free, but queries only resolve after registering
      your resolver IPs.
    zone: b.barracudacentral.org
    query: { method: dnsbl, record_types: [A, TXT], rfc5782_probe: true }
    tier: high
    weight: 1.0
    severity: critical
    enabled: true
    lookup_url: https://www.barracudacentral.org/lookups
    delist_url: https://www.barracudacentral.org/rbl/removal-request
    return_codes:
      "127.0.0.2": { label: "Barracuda listed", severity: critical, problem_state: PS-1 }
    access:
      cost: registration
      notes: "Register your resolver IPs at barracudacentral.org before queries resolve; removal form usually processes <24h."
    status: { alive: true }

  - name: SpamCop SCBL
    url: https://www.spamcop.net
    type: ip
    description: >-
      Cisco's spam-trap and user-report driven list. Forgiving — listings
      auto-expire ~24h after reports stop, so treat as warning unless
      persistent.
    zone: bl.spamcop.net
    query: { method: dnsbl, record_types: [A, TXT], rfc5782_probe: true }
    tier: high
    weight: 0.7
    severity: warning
    enabled: true
    lookup_url: https://www.spamcop.net/bl.shtml
    delist_url: https://www.spamcop.net/bl.shtml
    auto_expires: "~24h after reports stop"
    return_codes:
      "127.0.0.2": { label: "SCBL (spam-trap reports)", severity: warning, problem_state: PS-5 }
    access: { cost: free }
    status: { alive: true }

  - name: PSBL
    url: https://psbl.org
    type: ip
    description: >-
      Passive Spam Block List (surriel.com) — trap-driven, auto-expiring in
      2–4 weeks, with instant no-questions self-removal.
    zone: psbl.surriel.com
    query: { method: dnsbl, record_types: [A, TXT], rfc5782_probe: true }
    tier: high
    weight: 0.7
    severity: warning
    enabled: true
    lookup_url: https://psbl.org
    delist_url: https://psbl.org/remove
    auto_expires: "2–4 weeks; instant self-removal"
    return_codes:
      "127.0.0.2": { label: "PSBL (passive spam trap)", severity: warning, problem_state: PS-5 }
    access: { cost: free }
    status: { alive: true }

  - name: DroneBL
    url: https://dronebl.org
    type: ip
    description: >-
      Botnet drones, open proxies, and DDoS sources. Like XBL, a hit means a
      compromised host — clean the compromise before requesting removal.
    zone: dnsbl.dronebl.org
    query: { method: dnsbl, record_types: [A, TXT], rfc5782_probe: true }
    tier: high
    weight: 0.9
    severity: critical
    enabled: true
    lookup_url: https://dronebl.org/lookup
    delist_url: https://dronebl.org/lookup
    return_codes:
      "127.0.0.3": { label: "IRC drone", severity: critical, problem_state: PS-2 }
      "127.0.0.8": { label: "SOCKS proxy", severity: critical, problem_state: PS-2 }
      "127.0.0.9": { label: "HTTP proxy", severity: critical, problem_state: PS-2 }
      "127.0.0.10": { label: "proxy", severity: critical, problem_state: PS-2 }
      "127.0.0.13": { label: "DDoS drone", severity: critical, problem_state: PS-2 }
      "127.0.0.14": { label: "breached host", severity: critical, problem_state: PS-2 }
      "127.0.0.16": { label: "autorooted host", severity: critical, problem_state: PS-2 }
    access: { cost: free }
    status: { alive: true }

  - name: Invaluement ivmSIP
    url: https://www.invaluement.com
    type: ip
    description: >-
      Subscriber-only IP reputation feed (ivmSIP + ivmSIP/24) used by
      commercial filters. No public DNS zone — the web lookup is free, the
      feed is paid.
    query: { method: web_only }
    tier: high
    weight: 0.8
    severity: warning
    enabled: false
    lookup_url: https://www.invaluement.com/lookup/
    delist_url: https://www.invaluement.com/removal/
    access: { cost: paid, notes: "Paid feed/licensed resolver; free removal form." }
    status: { alive: true }

  # ==========================================================================
  # Tier HIGH — domain / URI blocklists (RHSBL)
  # ==========================================================================
  - name: Spamhaus DBL
    url: https://www.spamhaus.org
    type: domain
    description: >-
      The Spamhaus Domain Block List — the name itself is listed, so every
      message carrying the domain is suspect no matter which IP sends it.
      Codes distinguish bad domains (spam/phish/malware/C&C) from
      "abused-legit" compromises, which need a different fix.
    zone: dbl.spamhaus.org
    query: { method: rhsbl, record_types: [A, TXT], rfc5782_probe: true }
    tier: high
    weight: 1.0
    severity: critical
    enabled: true
    lookup_url: https://check.spamhaus.org
    delist_url: https://check.spamhaus.org
    return_codes:
      "127.0.1.2": { label: "spam domain", severity: critical, problem_state: PS-4 }
      "127.0.1.4": { label: "phishing domain", severity: critical, problem_state: PS-4 }
      "127.0.1.5": { label: "malware domain", severity: critical, problem_state: PS-4 }
      "127.0.1.6": { label: "botnet C&C domain", severity: critical, problem_state: PS-4 }
      "127.0.1.102": { label: "abused-legit: spam", severity: warning, problem_state: PS-4 }
      "127.0.1.103": { label: "abused-legit: redirector", severity: warning, problem_state: PS-4 }
      "127.0.1.104": { label: "abused-legit: phish", severity: warning, problem_state: PS-4 }
      "127.0.1.105": { label: "abused-legit: malware", severity: warning, problem_state: PS-4 }
      "127.0.1.106": { label: "abused-legit: botnet", severity: warning, problem_state: PS-4 }
      "127.0.1.255": { label: "IP queried at DBL (query bug — never a listing)", severity: info }
    refusal_codes: ["127.255.255.252", "127.255.255.254", "127.255.255.255"]
    access:
      cost: free
      notes: "Same terms as ZEN (free low-volume / DQS key)."
      dqs_zone: "{key}.dbl.dq.spamhaus.net"
    status: { alive: true }

  - name: Spamhaus ZRD
    url: https://www.spamhaus.org
    type: domain
    description: >-
      Zero Reputation Domains — every domain observed <24h old, by
      definition. Ages out automatically at 24 hours; a maturity gate, not
      an accusation (PS-11).
    zone: zrd.dq.spamhaus.net
    query: { method: rhsbl, record_types: [A, TXT], rfc5782_probe: false }
    tier: medium
    weight: 0.3
    severity: info
    enabled: false
    lookup_url: https://check.spamhaus.org
    delist_url: https://check.spamhaus.org
    auto_expires: "24h after first observation"
    access:
      cost: registration
      notes: "Requires the free-tier Spamhaus DQS key."
      dqs_zone: "{key}.zrd.dq.spamhaus.net"
    status: { alive: true }

  - name: SURBL multi
    url: https://www.surbl.org
    type: domain
    description: >-
      Multi-source domain/URI list (phishing, malware, abuse, cracked
      sites) consulted by SpamAssassin and most commercial engines; the
      answer's last octet is a bitmask naming the sub-list.
    zone: multi.surbl.org
    query: { method: rhsbl, record_types: [A, TXT], rfc5782_probe: true }
    tier: high
    weight: 1.0
    severity: critical
    enabled: true
    lookup_url: https://www.surbl.org/surbl-analysis
    delist_url: https://www.surbl.org/surbl-analysis
    bitmask:
      "8": { label: "PH (phishing)", severity: critical, problem_state: PS-4 }
      "16": { label: "MW (malware)", severity: critical, problem_state: PS-4 }
      "64": { label: "ABUSE", severity: warning, problem_state: PS-4 }
      "128": { label: "CR (cracked site)", severity: warning, problem_state: PS-4 }
    access: { cost: free, notes: "Free public DNS <250k queries/day; data feed for commercial volume." }
    status: { alive: true }

  - name: URIBL
    url: https://uribl.com
    type: domain
    description: >-
      Domain/URI list (black/grey/red sub-zones by confidence). Bit 1
      (127.0.0.1) is URIBL_BLOCKED — a query refusal from public resolvers
      or over-limit clients, never a listing.
    zone: multi.uribl.com
    query: { method: rhsbl, record_types: [A, TXT], rfc5782_probe: true }
    tier: high
    weight: 0.9
    severity: warning
    enabled: true
    lookup_url: https://admin.uribl.com/?section=lookup
    delist_url: https://admin.uribl.com/?section=lookup
    bitmask:
      "2": { label: "black", severity: critical, problem_state: PS-4 }
      "4": { label: "grey", severity: warning, problem_state: PS-4 }
      "8": { label: "red", severity: warning, problem_state: PS-4 }
    refusal_codes: ["127.0.0.1"]
    access: { cost: free, notes: "Free low volume via a real recursive resolver; 127.0.0.1 = blocked/over limit." }
    status: { alive: true }

  - name: Invaluement ivmURI
    url: https://www.invaluement.com
    type: domain
    description: >-
      Subscriber-only domain/URI reputation feed, sister of ivmSIP. Web
      lookup free; feed paid. Overlaps pm/checks/link_url_reputation.mdx.
    query: { method: web_only }
    tier: high
    weight: 0.8
    severity: warning
    enabled: false
    lookup_url: https://www.invaluement.com/lookup/
    delist_url: https://www.invaluement.com/removal/
    access: { cost: paid }
    status: { alive: true }

  # ==========================================================================
  # Tier MEDIUM — actively maintained, meaningful coverage
  # ==========================================================================
  - name: Abusix Mail Intelligence
    url: https://abusix.com
    type: both
    description: >-
      Combined IP + domain zones (black, exploit, dyn, noptr, dblack) with a
      free API key embedded in the query name. Off until a key is configured
      in Settings.
    zone: combined.mail.abusix.zone
    query: { method: dnsbl, record_types: [A, TXT], rfc5782_probe: true, key_template: "{key}.combined.mail.abusix.zone" }
    tier: medium
    weight: 0.7
    severity: warning
    enabled: false
    lookup_url: https://lookup.abusix.com
    delist_url: https://lookup.abusix.com
    access: { cost: registration, notes: "Free account + API key at app.abusix.com; key goes in the query name." }
    status: { alive: true }

  - name: SpamRATS
    url: https://www.spamrats.com
    type: ip
    description: >-
      RATS-Dyna / NoPtr / Spam / Auth — mostly rDNS-policy and
      auth-attack listings. A hit usually means a missing or generic PTR
      (fix FCrDNS first), not spam.
    zone: all.spamrats.com
    query: { method: dnsbl, record_types: [A], rfc5782_probe: true }
    tier: medium
    weight: 0.6
    severity: warning
    enabled: true
    lookup_url: https://www.spamrats.com/lookup.php
    delist_url: https://www.spamrats.com/removal.php
    return_codes:
      "127.0.0.36": { label: "RATS-Dyna (dynamic-looking PTR)", severity: warning, problem_state: PS-7 }
      "127.0.0.37": { label: "RATS-NoPtr (missing PTR)", severity: warning, problem_state: PS-7 }
      "127.0.0.38": { label: "RATS-Spam", severity: warning, problem_state: PS-5 }
      "127.0.0.43": { label: "RATS-Auth (auth attacks)", severity: warning, problem_state: PS-2 }
    access: { cost: free, notes: "Fix the PTR to a proper FQDN before the removal form." }
    status: { alive: true }

  - name: Mailspike BL
    url: https://mailspike.io
    type: ip
    description: >-
      Bitsight/AnubisNetworks blacklist zone; sister zones cover zero-hour
      outbreaks and continuous reputation.
    zone: bl.mailspike.net
    query: { method: dnsbl, record_types: [A, TXT], rfc5782_probe: true }
    tier: medium
    weight: 0.6
    severity: warning
    enabled: true
    lookup_url: https://mailspike.io/ip_verify
    delist_url: https://mailspike.io/ip_verify
    return_codes:
      "127.0.0.2": { label: "Mailspike blacklist", severity: warning, problem_state: PS-5 }
    access: { cost: free }
    status: { alive: true }

  - name: Mailspike zero-hour
    url: https://mailspike.io
    type: ip
    description: >-
      Zero-hour outbreak list — flags IPs participating in an active spam
      wave; drops automatically within hours.
    zone: z.mailspike.net
    query: { method: dnsbl, record_types: [A], rfc5782_probe: true }
    tier: medium
    weight: 0.5
    severity: warning
    enabled: true
    lookup_url: https://mailspike.io/ip_verify
    delist_url: https://mailspike.io/ip_verify
    auto_expires: "hours (zero-hour outbreak list)"
    access: { cost: free }
    status: { alive: true }

  - name: Mailspike reputation
    url: https://mailspike.io
    type: ip
    description: >-
      Continuous 0–100-style reputation zone (127.0.0.10 worst … .20 best).
      Advisory — consumed by the positive-reputation probes, not the
      listing sweep.
    zone: rep.mailspike.net
    query: { method: dnsbl, record_types: [A], rfc5782_probe: false }
    tier: medium
    weight: 0.0
    severity: info
    enabled: false
    advisory: true
    lookup_url: https://mailspike.io/ip_verify
    delist_url: https://mailspike.io/ip_verify
    access: { cost: free }
    status: { alive: true }

  - name: Lashback UBL
    url: https://www.lashback.com
    type: ip
    description: >-
      Unsubscribe Blacklist — senders who mailed unsubscribe-abuse traps. A
      list-hygiene problem, not an infection.
    zone: ubl.lashback.com
    query: { method: dnsbl, record_types: [A], rfc5782_probe: true }
    tier: medium
    weight: 0.5
    severity: warning
    enabled: true
    lookup_url: https://blacklist.lashback.com
    delist_url: https://blacklist.lashback.com
    return_codes:
      "127.0.0.2": { label: "unsubscribe-abuse trap", severity: warning, problem_state: PS-5 }
    access: { cost: free }
    status: { alive: true }

  - name: WPBL
    url: http://wpbl.info
    type: ip
    description: >-
      Weighted Private Block List — a private trap network; auto-ages ~10
      days after spam stops.
    zone: db.wpbl.info
    query: { method: dnsbl, record_types: [A], rfc5782_probe: true }
    tier: medium
    weight: 0.5
    severity: warning
    enabled: true
    lookup_url: http://wpbl.info
    delist_url: http://wpbl.info
    auto_expires: "~10 days after spam stops"
    return_codes:
      "127.0.0.2": { label: "WPBL (private trap network)", severity: warning, problem_state: PS-5 }
    access: { cost: free }
    status: { alive: true }

  - name: 0spam
    url: https://0spam.org
    type: ip
    description: >-
      0spam Project primary IP zone (sister zones rbl./nbl.; domain zone
      url.0spam.org). Free self-service delisting portal.
    zone: bl.0spam.org
    query: { method: dnsbl, record_types: [A], rfc5782_probe: true }
    tier: medium
    weight: 0.4
    severity: warning
    enabled: true
    lookup_url: https://0spam.org
    delist_url: https://0spam.org
    access: { cost: free }
    status: { alive: true }

  - name: 0spam URL
    url: https://0spam.org
    type: domain
    description: >-
      0spam Project domain/URL zone — the RHSBL side of the 0spam project.
    zone: url.0spam.org
    query: { method: rhsbl, record_types: [A], rfc5782_probe: true }
    tier: medium
    weight: 0.4
    severity: warning
    enabled: true
    lookup_url: https://0spam.org
    delist_url: https://0spam.org
    access: { cost: free }
    status: { alive: true }

  - name: s5h.net
    url: https://usan.s5h.net
    type: ip
    description: >-
      Community trap-driven IP list with self-service removal via its query
      page.
    zone: all.s5h.net
    query: { method: dnsbl, record_types: [A], rfc5782_probe: true }
    tier: medium
    weight: 0.4
    severity: warning
    enabled: true
    lookup_url: https://usan.s5h.net/query/
    delist_url: https://usan.s5h.net/query/
    access: { cost: free }
    status: { alive: true }

  - name: Blocklist.de
    url: https://www.blocklist.de
    type: ip
    description: >-
      Brute-force attack sources (ssh/imap/smtp) reported by fail2ban
