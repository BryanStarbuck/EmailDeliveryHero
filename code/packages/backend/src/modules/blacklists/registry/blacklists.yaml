      "127.0.0.3": { label: "yellow (mixed)", severity: info }
      "127.0.0.4": { label: "brown (dynamic)", severity: info, problem_state: PS-3 }
      "127.0.0.5": { label: "NOBL (no blacklisting)", severity: ok }
    access: { cost: free }
    status: { alive: true }

